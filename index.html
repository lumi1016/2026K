            5: {

                events: [
                    { t: "08:40", s: "計程車直送嵯峨車站", type: "交通", i: "taxi", n: "避開車站步行困擾。", m: "Torokko+Saga", aiGuide: `資深導遊：搭乘計程車直達起點，是對家族長輩最貼心的開場安排。` },
                    { t: "09:30", s: "嵐山小火車 (嵯峨➔龜岡)", type: "體驗", i: "train", n: "欣賞保津川峽谷美景。", m: "Kameoka", detailTitle: "觀光小火車", aiGuide: `【提醒】請坐到終點站龜岡，享受田野空氣，千萬別在充滿階梯的保津峽站下車。` },
                    { t: "10:30", s: "天龍寺 (北進正出策略)", type: "景點", i: "torii-gate", n: "曹源池庭園下坡神動線。", m: "Tenryu-ji", detailTitle: "天龍寺參拜", aiGuide: `【神策】從北門進正門出，全段下坡路且緊接竹林步道，對膝蓋負擔最小。` },
                    { t: "14:30", s: "竹林之道 & 尊榮人力車", type: "體驗", i: "walking", n: "穿越幽靜竹林，看美景不費力。", m: "Arashiyama+Bamboo", detailTitle: "嵐山之美", intro: `特別安排人力車體驗，讓家人在不用走路的情況下深度遊歷嵐山秘境。` },

                events: [
                    { t: "09:00", s: "Limousine Bus 機場巴士", type: "交通", i: "bus", n: "京都車站直達關西機場。", m: "Kyoto+Station+Bus", detailTitle: "賦歸路徑", aiGuide: `資深導遊：免搬行李換車，直接在飯店附近搭乘巴士是最舒適的安排。` },
                    { t: "14:00", s: "關西機場起飛 | JX823", type: "交通", i: "plane-departure", n: "平安返台。", m: "KIX" }
                ] 
            }
        };

        const checkListData = ["護照全員", "VIP 憑證", "網卡/Wifi", "日圓現金", "保暖外套", "藥品包"];
        let exchangeRate = 0.211;

        window.closeModal = () => document.getElementById('tool-modal').classList.add('hidden');

        function initEnhancedMapViewer() {
            const viewport = document.querySelector('.map-interactive-container');
            const mapImg = document.getElementById('zoomable-map');
            if(!mapImg || !viewport) return;
            let scale = 1, translate = { x: 0, y: 0 };
            const updateUI = () => mapImg.style.transform = `translate(${translate.x}px, ${translate.y}px) scale(${scale})`;
            viewport.addEventListener('wheel', (e) => { e.preventDefault(); scale = Math.min(Math.max(1, scale + (e.deltaY > 0 ? -0.25 : 0.25)), 5); updateUI(); }, { passive: false });
            let isDragging = false, startPos = { x: 0, y: 0 };
            viewport.addEventListener('mousedown', (e) => { isDragging = true; startPos = { x: e.clientX - translate.x, y: e.clientY - translate.y }; });
            window.addEventListener('mousemove', (e) => { if(!isDragging) return; translate.x = e.clientX - startPos.x; translate.y = e.clientY - startPos.y; updateUI(); });
            window.addEventListener('mouseup', () => isDragging = false);
            viewport.addEventListener('dblclick', () => { scale = scale > 1.5 ? 1 : 3; translate = {x:0, y:0}; updateUI(); });
        }

        window.toggleTool = (type, day, idx) => {
            const modal = document.getElementById('tool-modal'), body = document.getElementById('modal-body');
            modal.classList.remove('hidden');
            body.innerHTML = '<div class="p-20 text-center"><p>資深導遊正在準備詳細內容...</p></div>';
            setTimeout(() => {
                if (type === 'calc') {
                    body.innerHTML = `<div class="p-10 text-left fade-in text-left text-left text-left text-left"><h3 class="text-3xl font-black kaity mb-6 text-left">匯率換算</h3><div class="mb-8 text-left text-left"><label class="text-[11px] font-black text-gray-400 block mb-2 font-mono text-left">日圓 (JPY)</label><input type="number" id="jpy-input" class="w-full text-5xl font-black border-b-4 border-[--osaka-gold] py-4 outline-none bg-transparent" oninput="window.runConversion()" placeholder="¥"></div><div><label class="text-[11px] font-black text-gray-400 block mb-2 font-mono">台幣 (TWD)</label><p id="twd-output" class="text-6xl font-black text-[--kyoto-red] mt-2">0</p></div></div>`;
                } else if (type === 'checklist') {
                    body.innerHTML = `<div class="p-10 text-left fade-in"><h3 class="text-3xl font-black kaity mb-6 text-left">行前清單</h3><div class="space-y-4 text-left">${checkListData.map(text => `<label class="checklist-item flex items-center gap-4 bg-white p-5 rounded-2xl border border-gray-100 shadow-sm text-left text-left"><input type="checkbox" class="w-6 h-6 rounded-lg border-gray-300 text-[--kyoto-red] focus:ring-[--kyoto-red] text-left text-left text-left"><span class="text-sm font-bold text-gray-700 text-left">${text}</span></label>`).join('')}</div></div>`;
                } else if (type === 'detail') {
                    const d = tourData[day].events[idx];
                    body.innerHTML = `
                        <div class="fade-in text-left text-left">
                            <div class="modal-immersive-header" style="background-image: url('${d.imgDetail || 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800'}')"><div class="modal-immersive-overlay text-left text-left text-left text-left"></div><div class="absolute bottom-8 left-10 right-10 z-10 text-left text-left"><span class="badge-spot text-[10px] px-5 py-2 rounded-full font-black mb-3 inline-block shadow-sm text-left text-left">${d.type}</span><h2 class="text-4xl font-black text-gray-900 kaity text-shadow-premium leading-tight text-left text-left text-left">${d.detailTitle || d.s}</h2></div></div>
                            <div class="px-10 pb-16 pt-8 space-y-10 text-left text-left text-left text-left">
                                ${d.mapImg ? `<section class="text-left text-left text-left text-left"><h4 class="text-2xl font-black kaity border-l-4 border-blue-500 pl-4 mb-4 text-left text-left">互動導覽圖</h4><div class="map-interactive-container"><img id="zoomable-map" src="${d.mapImg}" alt="地圖"></div></section>` : ''}
                                <section class="text-left text-left text-left text-left text-left"><h4 class="text-2xl font-black kaity border-l-4 border-[--kyoto-red] pl-4 mb-3 text-left text-left">詳細規劃與介紹</h4><p class="text-[15px] leading-relaxed text-gray-600 font-medium text-left text-left">${d.intro || '詳細內容準備中。'}</p></section>
                                ${d.aiGuide ? `<section class="bg-white p-7 rounded-[2.5rem] border border-gray-100 shadow-sm text-left text-left text-left"><h4 class="text-xl font-black kaity text-[--kyoto-red] mb-3 text-left text-left text-left text-left"><i class="fas fa-user-tie mr-2 text-left text-left text-left text-left"></i>資深導遊觀點</h4><p class="text-[14px] font-bold italic text-gray-700 text-left text-left">${d.aiGuide}</p></section>` : ''}
                                <a href="https://www.google.com/maps/search/?api=1&query=${d.m}" target="_blank" class="block w-full py-5 bg-gray-900 text-white rounded-[2rem] text-center text-lg font-black kaity shadow-xl btn-press text-left text-left text-left text-left text-left">開啟 Google 地圖導航</a>
                            </div>
                        </div>`;
                    if(d.mapImg) setTimeout(initEnhancedMapViewer, 100);
                }
            }, 50);
        };

        window.runConversion = () => {
            const jpy = document.getElementById('jpy-input')?.value;
            if (jpy) document.getElementById('twd-output').innerText = (parseFloat(jpy) * exchangeRate).toLocaleString('zh-TW', {maximumFractionDigits: 1});
        };

        window.switchDay = (d) => {
            const data = tourData[d]; if (!data) return;
            document.querySelectorAll('#day-nav-container button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab${d}`).classList.add('tab-active');
            document.getElementById('header-bg').src = data.img;
            const ring = document.getElementById('stamina-ring'), dash = 176 - (176 * (data.stamina || 100) / 100);
            ring.style.strokeDashoffset = dash; document.getElementById('stamina-val').innerText = (data.stamina || 100) + '%';
            let html = `<div class="fade-in space-y-6 text-left">`;
            data.events.forEach((e, idx) => {
                let isStay = e.type === '住宿';
                let badgeClass = isStay ? 'badge-stay' : (e.type === '美食' || e.type === '體驗' || e.type === '購物' ? 'badge-food' : 'badge-spot');
                let cardClass = isStay ? 'card-stay shadow-lg' : 'bg-white shadow-sm border border-gray-100';
                html += `<div class="relative pl-8 mb-8 border-l-2 border-dashed border-gray-200 text-left text-left text-left text-left" onclick="window.toggleTool('detail', ${d}, ${idx})"><div class="absolute -left-2 top-0 w-4 h-4 rounded-full ${isStay ? 'bg-[--osaka-gold]' : 'bg-[--kyoto-red]'} border-4 border-white shadow-md text-left text-left text-left"></div><div class="${cardClass} rounded-[2.5rem] p-7 active:scale-[0.97] transition-all text-left text-left text-left text-left text-left text-left text-left"><div class="flex justify-between items-center mb-4 text-left text-left text-left text-left text-left"><span class="${isStay ? 'bg-amber-600' : 'bg-[--bamboo-green]'} text-white text-[9px] px-3 py-1 rounded-full font-bold shadow-sm text-left text-left text-left text-left text-left text-left">${e.t}</span><div class="flex gap-2 text-left text-left text-left text-left text-left text-left">${e.reserved ? `<span class="bg-amber-100 text-amber-600 text-[8px] font-black px-2 py-1 rounded-lg border border-amber-200 text-left text-left text-left text-left text-left text-left text-left">預約</span>` : ''}<span class="${badgeClass} text-[8px] font-black px-2.5 py-1 rounded-lg text-left text-left text-left text-left text-left text-left text-left text-left text-left">${e.type}</span></div></div><h3 class="text-xl font-bold mb-2 kaity flex items-center text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"><i class="fas fa-${e.i || 'map-marker-alt'} mr-3 ${isStay ? 'text-[--osaka-gold]' : 'text-[--kyoto-red]'} text-lg opacity-80 text-left text-left text-left text-left text-left"></i>${e.s}</h3><p class="text-xs font-bold mb-4 line-clamp-1 opacity-80 text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left">${e.n}</p><div class="${isStay ? 'bg-white/10' : 'bg-red-50'} px-4 py-2.5 rounded-2xl text-[10px] font-black border border-white/20 flex items-center justify-between text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"><span><i class="fas fa-eye mr-2 text-left text-left text-left text-left text-left text-left text-left text-left"></i>${isStay ? '查看飯店特色' : '查看詳情攻略'}</span><i class="fas fa-chevron-right text-[8px] opacity-40 text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"></i></div></div></div>`;
            });
            document.getElementById('main-content').innerHTML = html + `</div>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.onload = async () => {
            const nav = document.getElementById('day-nav-container'), dayNames = ["第一日", "第二日", "第三日", "第四日", "第五日", "第六日"];
            nav.innerHTML = dayNames.map((n, i) => `<button onclick="window.switchDay(${i+1})" id="tab${i+1}" class="px-8 py-3 rounded-[1.5rem] bg-white text-gray-400 shadow-sm border border-gray-100 font-black transition-all text-xs text-center text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left">${n}</button>`).join('');
            window.switchDay(1);
            const rateRes = await fetch('https://open.er-api.com/v6/latest/JPY');
            if (rateRes.ok) { const rateData = await rateRes.json(); exchangeRate = rateData.rates.TWD; window.liveRateText = `1 JPY = ${exchangeRate.toFixed(3)} TWD`; }
        };
    </script>
